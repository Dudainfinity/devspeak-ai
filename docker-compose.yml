services:
  speech-service:
    build:
      context: .
      dockerfile: speech-service/Dockerfile
    image: devspeak-speech-service:local
    ports:
      - "8080:8080"
    environment:
      STATIC_DIR: /app/public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DATABASE_URL: postgres://devspeak:devspeak123@postgres:5432/devspeak_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-}
    volumes:
      # hot-reload do frontend em dev: edita ./frontend e recarrega o browser
      - ./frontend:/app/public:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devspeak
      POSTGRES_PASSWORD: devspeak123
      POSTGRES_DB: devspeak_db
    ports:
      # 5433 no host pra não brigar com um postgres local na porta padrão
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devspeak -d devspeak_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
