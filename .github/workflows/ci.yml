name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        working-directory: ./speech-service
        run: go mod tidy

      - name: Build application
        working-directory: ./speech-service
        run: go build -v .

      - name: Build Docker image
        working-directory: ./speech-service
        run: docker build -t devspeak-speech .
