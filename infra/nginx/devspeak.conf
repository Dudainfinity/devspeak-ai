# DevSpeak AI — reverse proxy with HTTPS
# Instalar em /etc/nginx/conf.d/devspeak.conf (o script setup-nginx-https.sh faz isso).

server {
    listen 80;
    server_name 13-220-172-249.sslip.io;

    # Mantemos a rota ACME no HTTP para renovacoes automaticas do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Todo o resto forca HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 13-220-172-249.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/13-220-172-249.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13-220-172-249.sslip.io/privkey.pem;

    # TLS moderno (Mozilla intermediate)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    # Cabecalhos de seguranca
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # Reverse proxy -> speech-service (container bind em 127.0.0.1:8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
